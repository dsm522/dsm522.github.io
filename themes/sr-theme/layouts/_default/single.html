{{ define "main" }}
<div class="post-page">
  <div class="post-container">
    <a href="javascript:history.back()" class="post-back">← Back</a>
    <header class="post-header">
      <p class="post-date">{{ .Date.Format "2 January 2006" }}</p>
      <h1 class="post-title">{{ .Title }}</h1>
      <div class="post-divider"></div>
    </header>
    <div class="post-content">
      {{ .Content }}
    </div>
  </div>
</div>
{{ end }}
